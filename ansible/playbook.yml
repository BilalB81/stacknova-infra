---
- name: Configuration de l'environnement de recette StackNova
  hosts: recette
  gather_facts: false

  vars:
    deploy_timestamp: "{{ lookup('pipe', 'date \"+%d/%m/%Y a %H:%M:%S\"') }}"

  tasks:

    - name: Creer la page HTML personnalisee
      ansible.builtin.raw: |
        printf '<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n<title>StackNova - recette</title>\n<style>\nbody { font-family: sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n.card { background: #1e293b; padding: 2rem 3rem; border-radius: 12px; border-left: 4px solid #3b82f6; text-align: center; }\nh1 { color: #3b82f6; font-size: 2rem; }\n.env { background: #f59e0b; color: #000; padding: 0.2rem 0.8rem; border-radius: 999px; font-weight: bold; }\n.meta { color: #94a3b8; font-size: 0.9rem; margin-top: 1rem; }\n</style>\n</head>\n<body>\n<div class="card">\n<h1>StackNova</h1>\n<span class="env">recette</span>\n<p>Environnement de recette - equipe QA</p>\n<p class="meta">Deploye le : DEPLOY_DATE</p>\n<p class="meta">Gere par Terraform + Ansible</p>\n</div>\n</body>\n</html>\n' > /usr/share/nginx/html/index.html
      changed_when: true

    - name: Injecter la date de deploiement
      ansible.builtin.raw: "sed -i 's/DEPLOY_DATE/{{ deploy_timestamp }}/g' /usr/share/nginx/html/index.html"
      changed_when: true

    - name: Verifier que Nginx est actif
      ansible.builtin.raw: pgrep nginx
      register: nginx_check
      failed_when: nginx_check.rc != 0
      changed_when: false
